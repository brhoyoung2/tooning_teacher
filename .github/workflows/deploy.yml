name: Deploy to Google Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp 설치
        run: npm install -g @google/clasp

      - name: clasp 인증 설정
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: GAS에 코드 업로드 (push)
        run: clasp push --force

      - name: 버전 읽기
        id: version
        run: |
          VERSION=$(grep "const VERSION" Code.gs | grep -oP "'[^']+'" | tr -d "'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "배포 버전: $VERSION"

      - name: 새 버전 배포 (deploy)
        run: clasp deploy --description "${{ steps.version.outputs.version }}"

      - name: 배포 완료 알림
        run: |
          echo "✅ 배포 완료: ${{ steps.version.outputs.version }}"
          echo "배포 목록:"
          clasp deployments
